<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 관리</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 로그인 화면 -->
  <div id="login-screen" class="screen auth-screen">
    <div class="auth-card">
      <h1 class="auth-title">할 일 관리</h1>
      <p class="auth-subtitle">로그인 후 이용해 주세요</p>
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="login-name">사용자 이름</label>
          <input type="text" id="login-name" placeholder="사용자 이름을 입력하세요" required maxlength="50" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="login-password">패스워드</label>
          <input type="password" id="login-password" placeholder="패스워드를 입력하세요" required maxlength="100" autocomplete="current-password">
        </div>
        <p class="auth-error" id="login-error" hidden></p>
        <button type="submit" class="btn btn-primary">로그인</button>
      </form>
      <button type="button" class="btn btn-link" id="go-admin-btn">사용자 관리 페이지로 이동</button>
    </div>
  </div>

  <!-- 사용자 관리 화면 -->
  <div id="admin-screen" class="screen auth-screen" hidden>
    <div class="auth-card admin-card">
      <h1 class="auth-title">사용자 관리</h1>

      <div id="admin-login-panel">
        <p class="auth-subtitle">관리자 계정으로 로그인하세요</p>
        <form id="admin-login-form" class="auth-form">
          <div class="form-group">
            <label for="admin-login-name">관리자 이름</label>
            <input type="text" id="admin-login-name" value="administrator" readonly>
          </div>
          <div class="form-group">
            <label for="admin-login-password">패스워드</label>
            <input type="password" id="admin-login-password" placeholder="관리자 패스워드를 입력하세요" required maxlength="100" autocomplete="current-password">
          </div>
          <p class="auth-error" id="admin-login-error" hidden></p>
          <button type="submit" class="btn btn-primary">관리자 로그인</button>
        </form>
      </div>

      <div id="admin-management-panel" hidden>
        <section class="admin-section admin-account-section">
          <h2>관리자 계정</h2>
          <form id="admin-password-form" class="admin-inline-form">
            <div class="form-group">
              <label for="admin-account-name">이름</label>
              <input type="text" id="admin-account-name" value="administrator" readonly>
            </div>
            <div class="form-group">
              <label for="admin-account-password">패스워드</label>
              <input type="text" id="admin-account-password" required maxlength="100">
            </div>
            <button type="submit" class="btn btn-secondary">패스워드 저장</button>
          </form>
        </section>

        <section class="admin-section">
          <div class="admin-section-header">
            <h2>등록된 사용자</h2>
            <button type="button" class="btn btn-primary btn-sm" id="open-add-user-btn">+ 신규 사용자 추가</button>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>번호</th>
                  <th>이름</th>
                  <th>패스워드</th>
                  <th>생성된 시간</th>
                  <th>접속횟수</th>
                  <th>관리</th>
                </tr>
              </thead>
              <tbody id="admin-user-list"></tbody>
            </table>
          </div>
          <p class="empty-message" id="admin-user-empty">등록된 사용자가 없습니다.</p>
        </section>

        <button type="button" class="btn btn-secondary" id="admin-logout-btn">관리자 로그아웃</button>
      </div>

      <button type="button" class="btn btn-link" id="back-to-login-btn">로그인 화면으로 돌아가기</button>
    </div>
  </div>

  <!-- 사용자 추가/수정 모달 -->
  <div class="modal-overlay" id="user-modal-overlay" hidden>
    <div class="modal" role="dialog" aria-labelledby="user-modal-title" aria-modal="true">
      <div class="modal-header">
        <h2 id="user-modal-title">신규 사용자 추가</h2>
        <button type="button" class="btn-close" id="close-user-modal-btn" aria-label="닫기">&times;</button>
      </div>
      <form id="user-form">
        <div class="form-group">
          <label for="user-form-name">이름</label>
          <input type="text" id="user-form-name" required maxlength="50">
        </div>
        <div class="form-group">
          <label for="user-form-password">패스워드</label>
          <input type="text" id="user-form-password" required maxlength="100">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancel-user-modal-btn">취소</button>
          <button type="submit" class="btn btn-primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 메인 앱 -->
  <div id="main-app" hidden>
    <div class="user-session-bar">
      <div class="user-session-info">
        <p class="user-session-name" id="logged-in-user"></p>
        <p class="user-session-time" id="logged-in-time"></p>
      </div>
      <button type="button" class="btn btn-secondary btn-sm" id="logout-btn">로그아웃</button>
    </div>

  <div class="app">
    <header class="header">
      <h1>할 일 관리</h1>
      <p class="header-date" id="today-label"></p>
    </header>

    <section class="section today-section">
      <div class="section-header">
        <h2>오늘의 할 일</h2>
        <span class="badge" id="today-count">0</span>
      </div>
      <ul class="task-list" id="today-list"></ul>
      <p class="empty-message" id="today-empty">오늘 예정된 할 일이 없습니다.</p>
    </section>

    <div class="actions">
      <button type="button" class="btn btn-primary" id="open-modal-btn">
        + 새로운 할 일 추가하기
      </button>
    </div>

    <div class="view-toggle">
      <button type="button" class="btn btn-toggle active" id="list-view-btn">목록으로 보기</button>
      <button type="button" class="btn btn-toggle" id="calendar-view-btn">달력으로 보기</button>
    </div>

    <section class="section view-section">
      <div class="view-panel" id="list-view-panel">
        <div class="section-header">
          <h2>전체 할 일</h2>
          <span class="badge" id="all-count">0</span>
        </div>
        <div class="list-filter">
          <button type="button" class="btn btn-filter active" id="filter-all-btn">전체 보기</button>
          <button type="button" class="btn btn-filter" id="filter-incomplete-btn">미완료 할 일 보기</button>
          <button type="button" class="btn btn-filter" id="filter-completed-btn">완료된 일 보기</button>
        </div>
        <ul class="task-list" id="all-list"></ul>
        <p class="empty-message" id="all-empty">아직 등록된 할 일이 없습니다.</p>
      </div>

      <div class="view-panel" id="calendar-view-panel" hidden>
        <div class="calendar-header">
          <button type="button" class="btn btn-icon" id="calendar-prev-btn" aria-label="이전 달">&lsaquo;</button>
          <h2 class="calendar-title" id="calendar-title"></h2>
          <button type="button" class="btn btn-icon" id="calendar-next-btn" aria-label="다음 달">&rsaquo;</button>
        </div>
        <div class="calendar-weekdays">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <p class="empty-message" id="calendar-empty">이 달에 등록된 할 일이 없습니다.</p>
      </div>
    </section>
  </div>

  <!-- 할 일 상세 모달 -->
  <div class="modal-overlay" id="detail-modal-overlay" hidden>
    <div class="modal" role="dialog" aria-labelledby="detail-modal-title" aria-modal="true">
      <div class="modal-header">
        <h2 id="detail-modal-title">할 일 상세</h2>
        <button type="button" class="btn-close" id="close-detail-modal-btn" aria-label="닫기">&times;</button>
      </div>
      <form id="detail-form">
        <div class="detail-content">
          <div class="form-group">
            <label for="detail-edit-title">제목</label>
            <p class="detail-value detail-view" id="detail-title"></p>
            <input type="text" class="detail-edit" id="detail-edit-title" maxlength="100" hidden>
          </div>
          <div class="form-group">
            <label for="detail-edit-detail">상세 내용</label>
            <p class="detail-value detail-value-multiline detail-view" id="detail-detail"></p>
            <textarea class="detail-edit" id="detail-edit-detail" rows="4" maxlength="500" hidden></textarea>
          </div>
          <div class="form-group">
            <label for="detail-edit-tags-input">TAG</label>
            <div class="detail-value detail-tags-view detail-view" id="detail-tags"></div>
            <div class="detail-edit" id="detail-tags-edit-wrap" hidden>
              <div class="tag-input-wrap">
                <div class="tag-selected" id="detail-tag-selected"></div>
                <input type="text" id="detail-edit-tags-input" placeholder="TAG를 입력하거나 아래에서 선택하세요" maxlength="20" autocomplete="off">
              </div>
              <div class="tag-suggestions" id="detail-tag-suggestions"></div>
            </div>
          </div>
          <div class="form-group">
            <label for="detail-edit-date">일자</label>
            <p class="detail-value detail-view" id="detail-date"></p>
            <input type="date" class="detail-edit" id="detail-edit-date" hidden>
          </div>
        </div>
        <div class="modal-actions detail-modal-actions">
          <button type="button" class="btn btn-secondary" id="detail-edit-btn">편집</button>
          <button type="button" class="btn btn-success" id="detail-complete-btn">완료</button>
          <button type="button" class="btn btn-primary" id="detail-close-btn">닫기</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 새 할 일 추가 모달 -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-labelledby="modal-title" aria-modal="true">
      <div class="modal-header">
        <h2 id="modal-title">새로운 할 일</h2>
        <button type="button" class="btn-close" id="close-modal-btn" aria-label="닫기">&times;</button>
      </div>
      <form id="task-form">
        <div class="form-group">
          <label for="task-title">제목</label>
          <input type="text" id="task-title" placeholder="할 일 제목을 입력하세요" required maxlength="100">
        </div>
        <div class="form-group">
          <label for="task-detail">상세 내용</label>
          <textarea id="task-detail" rows="4" placeholder="할 일에 대한 상세 내용을 입력하세요" maxlength="500"></textarea>
        </div>
        <div class="form-group">
          <label for="task-tags-input">TAG</label>
          <div class="tag-input-wrap" id="task-tag-input-wrap">
            <div class="tag-selected" id="task-tag-selected"></div>
            <input type="text" id="task-tags-input" placeholder="TAG를 입력하거나 아래에서 선택하세요" maxlength="20" autocomplete="off">
          </div>
          <div class="tag-suggestions" id="task-tag-suggestions" aria-label="TAG 예시"></div>
        </div>
        <div class="form-group">
          <label for="task-date">일자</label>
          <input type="date" id="task-date" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancel-btn">취소</button>
          <button type="submit" class="btn btn-primary">추가하기</button>
        </div>
      </form>
    </div>
  </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
