<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 관리</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>할 일 관리</h1>
      <p class="header-date" id="today-label"></p>
    </header>

    <section class="section today-section">
      <div class="section-header">
        <h2>오늘의 할 일</h2>
        <span class="badge" id="today-count">0</span>
      </div>
      <ul class="task-list" id="today-list"></ul>
      <p class="empty-message" id="today-empty">오늘 예정된 할 일이 없습니다.</p>
    </section>

    <div class="actions">
      <button type="button" class="btn btn-primary" id="open-modal-btn">
        + 새로운 할 일 추가하기
      </button>
    </div>

    <div class="view-toggle">
      <button type="button" class="btn btn-toggle active" id="list-view-btn">목록으로 보기</button>
      <button type="button" class="btn btn-toggle" id="calendar-view-btn">달력으로 보기</button>
    </div>

    <section class="section view-section">
      <div class="view-panel" id="list-view-panel">
        <div class="section-header">
          <h2>전체 할 일</h2>
          <span class="badge" id="all-count">0</span>
        </div>
        <div class="list-filter">
          <button type="button" class="btn btn-filter active" id="filter-all-btn">전체 보기</button>
          <button type="button" class="btn btn-filter" id="filter-incomplete-btn">미완료 할 일 보기</button>
          <button type="button" class="btn btn-filter" id="filter-completed-btn">완료된 일 보기</button>
        </div>
        <ul class="task-list" id="all-list"></ul>
        <p class="empty-message" id="all-empty">아직 등록된 할 일이 없습니다.</p>
      </div>

      <div class="view-panel" id="calendar-view-panel" hidden>
        <div class="calendar-header">
          <button type="button" class="btn btn-icon" id="calendar-prev-btn" aria-label="이전 달">&lsaquo;</button>
          <h2 class="calendar-title" id="calendar-title"></h2>
          <button type="button" class="btn btn-icon" id="calendar-next-btn" aria-label="다음 달">&rsaquo;</button>
        </div>
        <div class="calendar-weekdays">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <p class="empty-message" id="calendar-empty">이 달에 등록된 할 일이 없습니다.</p>
      </div>
    </section>
  </div>

  <!-- 할 일 상세 모달 -->
  <div class="modal-overlay" id="detail-modal-overlay" hidden>
    <div class="modal" role="dialog" aria-labelledby="detail-modal-title" aria-modal="true">
      <div class="modal-header">
        <h2 id="detail-modal-title">할 일 상세</h2>
        <button type="button" class="btn-close" id="close-detail-modal-btn" aria-label="닫기">&times;</button>
      </div>
      <form id="detail-form">
        <div class="detail-content">
          <div class="form-group">
            <label for="detail-edit-title">제목</label>
            <p class="detail-value detail-view" id="detail-title"></p>
            <input type="text" class="detail-edit" id="detail-edit-title" maxlength="100" hidden>
          </div>
          <div class="form-group">
            <label for="detail-edit-detail">상세 내용</label>
            <p class="detail-value detail-value-multiline detail-view" id="detail-detail"></p>
            <textarea class="detail-edit" id="detail-edit-detail" rows="4" maxlength="500" hidden></textarea>
          </div>
          <div class="form-group">
            <label for="detail-edit-date">일자</label>
            <p class="detail-value detail-view" id="detail-date"></p>
            <input type="date" class="detail-edit" id="detail-edit-date" hidden>
          </div>
        </div>
        <div class="modal-actions detail-modal-actions">
          <button type="button" class="btn btn-secondary" id="detail-edit-btn">편집</button>
          <button type="button" class="btn btn-success" id="detail-complete-btn">완료</button>
          <button type="button" class="btn btn-primary" id="detail-close-btn">닫기</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 새 할 일 추가 모달 -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-labelledby="modal-title" aria-modal="true">
      <div class="modal-header">
        <h2 id="modal-title">새로운 할 일</h2>
        <button type="button" class="btn-close" id="close-modal-btn" aria-label="닫기">&times;</button>
      </div>
      <form id="task-form">
        <div class="form-group">
          <label for="task-title">제목</label>
          <input type="text" id="task-title" placeholder="할 일 제목을 입력하세요" required maxlength="100">
        </div>
        <div class="form-group">
          <label for="task-detail">상세 내용</label>
          <textarea id="task-detail" rows="4" placeholder="할 일에 대한 상세 내용을 입력하세요" maxlength="500"></textarea>
        </div>
        <div class="form-group">
          <label for="task-date">일자</label>
          <input type="date" id="task-date" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancel-btn">취소</button>
          <button type="submit" class="btn btn-primary">추가하기</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
